                        以人工智慧及影像辨識為基礎之抽菸偵測

                    <p>
                        本專題利用 YOLOv8、MediaPipe、EfficientNet-B0 與 OpenCV 等技術，
                        建立智慧抽菸偵測系統，可即時辨識抽菸行為，
